name: PHI-OMEGA-RUNTIME CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime and test dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -q pytest
          python -m pip install -e .

      - name: Compile runtime
        run: |
          python -m py_compile run_phi_omega.py
          python -m py_compile src/phi_omega_transition/core.py
          python -m py_compile src/phi_omega_transition/cli.py

      - name: Run runtime smoke
        run: python run_phi_omega.py examples/minimal_case.json --json

      - name: Run transition sufficiency CLI smoke
        run: |
          phi-omega-demo
          phi-omega-check examples/transition_demo.json

      - name: Run tests
        run: python -m pytest -q
